<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>不動産価格AI 推定</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif; padding: 20px; }
    label { display:block; margin-top:10px; }
    select, input { padding:6px; width:320px; }
    button { margin-top:12px; padding:8px 12px; }
    pre { background:#f6f8fa; padding:10px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>不動産価格AI 推定</h1>

  <label>都道府県
    <select id="prefecture">
      <option value="東京都">東京都</option>
    </select>
  </label>

  <label>市区町村
    <select id="city"></select>
  </label>

  <label>地区
    <select id="district">
      <option value="">（選択してください）</option>
    </select>
  </label>

  <label>面積（㎡） <input id="area" type="number" value="50" /></label>
  <label>築年数 <input id="age" type="number" value="40" /></label>
  <label>駅距離（分） <input id="station" type="number" value="10" /></label>
  <label>道路幅（m） <input id="road" type="number" value="5" /></label>

  <button id="btnPredict">推定する</button>

  <h2>結果</h2>
  <pre id="result">ここに結果が表示されます</pre>

  <script>
    let cityToDistricts = {};

    async function loadCities() {
      const res = await fetch("/static/cities.json");
      const cities = await res.json();
      const citySel = document.getElementById("city");
      cities.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        citySel.appendChild(opt);
      });
    }

    async function loadDistricts() {
      const res = await fetch("/static/city_to_districts.json");
      cityToDistricts = await res.json();
    }

    document.getElementById("city").addEventListener("change", (e) => {
      const city = e.target.value;
      const sel = document.getElementById("district");
      sel.innerHTML = '<option value="">（選択してください）</option>';
      const list = cityToDistricts[city] || [];
      list.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        sel.appendChild(opt);
      });
    });

    async function predict() {
      const data = {
        都道府県: document.getElementById("prefecture").value,
        市区町村: document.getElementById("city").value,
        地区: document.getElementById("district").value,
        面積: Number(document.getElementById("area").value),
        築年数: Number(document.getElementById("age").value),
        駅距離: Number(document.getElementById("station").value),
        道路幅: Number(document.getElementById("road").value)
      };

      const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const json = await res.json();
      document.getElementById("result").textContent =
        json.predicted_price
          ? `推定価格: ${json.predicted_price}\n\n詳細: ${JSON.stringify(json.used, null, 2)}`
          : JSON.stringify(json, null, 2);
    }

    document.getElementById("btnPredict").addEventListener("click", predict);

    // 初期ロード
    loadCities().then(loadDistricts);
  </script>
</body>
</html>
