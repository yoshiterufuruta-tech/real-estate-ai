<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>不動産価格推定AI</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 200px; padding: 5px; }
        button { margin-top: 20px; padding: 10px 20px; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h2>不動産価格推定AI</h2>

<label>市区町村名</label>
<select id="city"></select>

<label>地区名</label>
<select id="district"></select>

<label>面積（㎡）</label>
<input id="area" type="number">

<label>築年数</label>
<input id="age" type="number">

<label>最寄駅：距離（分）</label>
<input id="station" type="number">

<label>前面道路：幅員（m）</label>
<input id="road" type="number">

<label>建ぺい率（％）</label>
<input id="kenpei" type="number">

<label>容積率（％）</label>
<input id="yoseki" type="number">

<label>用途</label>
<select id="use">
    <option value="住宅">住宅</option>
    <option value="店舗">店舗</option>
    <option value="事務所">事務所</option>
</select>

<button onclick="predictPrice()">推定する</button>

<div id="result"></div>

<script>
// ===============================
// 1. 市区町村と地区のロード
// ===============================
async function loadCities() {
    const res = await fetch("/static/cities.json");
    const cities = await res.json();

    const citySelect = document.getElementById("city");
    cities.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        citySelect.appendChild(opt);
    });

    loadDistricts();
}

async function loadDistricts() {
    const city = document.getElementById("city").value;
    const res = await fetch("/static/city_to_districts.json");
    const mapping = await res.json();

    const districtSelect = document.getElementById("district");
    districtSelect.innerHTML = "";

    (mapping[city] || []).forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        districtSelect.appendChild(opt);
    });
}

document.getElementById("city").addEventListener("change", loadDistricts);

// ===============================
// 2. 推定API呼び出し
// ===============================
async function predictPrice() {
    const data = {
        "市区町村名": document.getElementById("city").value,
        "地区名": document.getElementById("district").value,
        "面積": parseFloat(document.getElementById("area").value),
        "築年数": parseFloat(document.getElementById("age").value),
        "駅距離": parseFloat(document.getElementById("station").value),
        "道路幅": parseFloat(document.getElementById("road").value),
        "建ぺい率": parseFloat(document.getElementById("kenpei").value),
        "容積率": parseFloat(document.getElementById("yoseki").value),
        "用途": document.getElementById("use").value
    };

    try {
        const res = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.predicted_price !== undefined) {
            document.getElementById("result").innerText =
                result.predicted_price.toLocaleString() + " 円";
        } else {
            document.getElementById("result").innerText = "推定に失敗しました";
        }
    } catch (e) {
        document.getElementById("result").innerText = "推定に失敗しました";
    }
}

// 初期ロード
loadCities();
</script>

</body>
</html>
