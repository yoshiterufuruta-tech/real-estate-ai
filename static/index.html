<!-- static/index.html -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>不動産価格AI 推定</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif; padding: 20px; }
    label { display:block; margin-top:10px; }
    select, input { padding:6px; width:320px; }
    button { margin-top:12px; padding:8px 12px; }
    pre { background:#f6f8fa; padding:10px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>不動産価格AI 推定（デモ）</h1>

  <label>都道府県
    <select id="prefecture">
      <option value="東京都">東京都</option>
      <option value="愛知県">愛知県</option>
      <option value="青森県">青森県</option>
    </select>
  </label>

  <label>市区町村
    <select id="city">
      <option value="世田谷区">世田谷区</option>
      <option value="渋谷区">渋谷区</option>
      <option value="港区">港区</option>
      <option value="八王子市">八王子市</option>
    </select>
  </label>

  <label>地区
    <select id="district" name="地区">
      <option value="">（選択してください）</option>
      <option value="三宿">三宿</option>
      <option value="三軒茶屋">三軒茶屋</option>
      <option value="上北沢">上北沢</option>
      <option value="上馬">上馬</option>
      <option value="北沢">北沢</option>
      <option value="神宮前">神宮前</option>
      <option value="代々木">代々木</option>
      <option value="恵比寿">恵比寿</option>
      <option value="広尾">広尾</option>
    </select>
  </label>

  <label>面積（㎡） <input id="area" type="number" value="50" /></label>
  <label>築年数 <input id="age" type="number" value="40" /></label>
  <label>駅距離（分） <input id="station" type="number" value="10" /></label>
  <label>道路幅（m） <input id="road" type="number" value="5" /></label>

  <button id="btnPredict">推定する</button>

  <h2>結果</h2>
  <pre id="result">ここに結果が表示されます</pre>

  <script>
    const cityToDistricts = {
      "世田谷区": ["三宿","三軒茶屋","上北沢","上馬","北沢"],
      "渋谷区": ["神宮前","代々木","恵比寿","広尾"],
      "港区": ["麻布","六本木","芝","白金"],
      "八王子市": ["八王子","北野","片倉"]
    };

    document.getElementById("city").addEventListener("change", (e) => {
      const city = e.target.value;
      const sel = document.getElementById("district");
      const current = sel.value;
      sel.innerHTML = '<option value="">（選択してください）</option>';
      const list = cityToDistricts[city] || [];
      list.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        sel.appendChild(opt);
      });
      if (list.includes(current)) sel.value = current;
    });

    async function predict() {
      const prefectureEl = document.getElementById("prefecture");
      const cityEl = document.getElementById("city");
      const districtEl = document.getElementById("district");

      const data = {
        都道府県: prefectureEl ? prefectureEl.value : "",
        市区町村: cityEl ? cityEl.value : "",
        地区: districtEl ? districtEl.value : "",
        面積: Number(document.getElementById("area")?.value) || 0,
        築年数: Number(document.getElementById("age")?.value) || 0,
        駅距離: Number(document.getElementById("station")?.value) || 0,
        道路幅: Number(document.getElementById("road")?.value) || 0,
        年度: "2024年第1四半期"
      };

      console.log("DEBUG sending payload:", data);

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        console.log("DEBUG predict result:", json);
        if (json.predicted_price !== undefined) {
          document.getElementById("result").textContent = "推定価格: " + json.predicted_price + "\n\n詳細: " + JSON.stringify(json.used, null, 2);
        } else {
          document.getElementById("result").textContent = "レスポンス: " + JSON.stringify(json, null, 2);
        }
      } catch (err) {
        console.error("fetch error:", err);
        document.getElementById("result").textContent = "通信エラー: " + err;
      }
    }

    document.getElementById("btnPredict").addEventListener("click", async () => {
      await predict();
    });

    document.getElementById("city").dispatchEvent(new Event('change'));
  </script>
</body>
</html>
